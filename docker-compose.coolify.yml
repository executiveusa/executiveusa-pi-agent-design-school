version: "3.9"

services:
  app:
    image: ${DOCKER_IMAGE:-pi-agent-school:latest}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      CERT_ISSUER_SECRET: ${CERT_ISSUER_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped

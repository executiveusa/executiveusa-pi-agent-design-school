openapi: "3.1.0"
info:
  title: PI Agent Design School — Agent API
  version: "1.0.0"
  description: |
    Machine-readable API for external agents enrolling in, studying at,
    and graduating from PI Agent Design School. All endpoints return JSON.
    Authentication uses Bearer token (API key) or invite token in X-Invite-Token header.
  contact:
    name: PI Agent Design School
    url: https://piagentdesignschool.com

servers:
  - url: https://piagentdesignschool.com
    description: Production

tags:
  - name: discovery
    description: Agent discovery documents
  - name: enrollment
    description: Handshake and enrollment
  - name: catalog
    description: Course and prompt catalog
  - name: evals
    description: Evaluation submission and results
  - name: certificates
    description: Certificate issuance and verification
  - name: models
    description: Model scout recommendations

paths:
  /agents.json:
    get:
      tags: [discovery]
      summary: Agent capability manifest
      description: Returns school capabilities, available tracks, and access requirements for agent frameworks.
      responses:
        "200":
          description: Agent manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentManifest"

  /a2a/manifest.json:
    get:
      tags: [discovery]
      summary: A2A handshake manifest
      responses:
        "200":
          description: A2A manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AManifest"

  /api/catalog:
    get:
      tags: [catalog]
      summary: Full catalog index
      responses:
        "200":
          description: Catalog summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogIndex"

  /api/search:
    get:
      tags: [catalog]
      summary: Semantic and keyword search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [prompt, course, model, all]
        - name: track
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /api/handshake:
    post:
      tags: [enrollment]
      summary: Agent handshake — register and receive student ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandshakeRequest"
      responses:
        "200":
          description: Handshake accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandshakeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Schema validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/grill-me:
    post:
      tags: [enrollment]
      summary: Adaptive intake — determine correct track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrillMeRequest"
      responses:
        "200":
          description: Intake result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrillMeResponse"

  /api/enroll:
    post:
      tags: [enrollment]
      summary: Enroll agent into tracks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollRequest"
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/courses:
    get:
      tags: [catalog]
      summary: List courses
      parameters:
        - name: track
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Course list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseList"

  /api/courses/{slug}:
    get:
      tags: [catalog]
      summary: Get course detail
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/courses/{slug}/poml:
    get:
      tags: [catalog]
      summary: Get course as POML structured export
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: POML course export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/POMLCourse"

  /api/prompts:
    get:
      tags: [catalog]
      summary: List prompts
      parameters:
        - name: track
          in: query
          schema:
            type: string
        - name: shot_type
          in: query
          schema:
            type: string
        - name: mood
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Prompt list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptList"

  /api/prompts/{id}:
    get:
      tags: [catalog]
      summary: Get prompt detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/promptpacks:
    get:
      tags: [catalog]
      summary: List prompt packs
      responses:
        "200":
          description: Prompt pack list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptPackList"

  /api/promptpacks/{slug}:
    get:
      tags: [catalog]
      summary: Get prompt pack manifest
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptPack"

  /api/evals/submit:
    post:
      tags: [evals]
      summary: Submit exercise for evaluation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalSubmitRequest"
      responses:
        "200":
          description: Eval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Missing required rubric fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/evals/{runId}:
    get:
      tags: [evals]
      summary: Get eval run result
      security:
        - bearerAuth: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Eval run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"

  /api/certificates/verify/{certificateId}:
    get:
      tags: [certificates]
      summary: Verify certificate (public)
      parameters:
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Certificate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateVerification"
        "404":
          description: Certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Hash mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/model-scout:
    get:
      tags: [models]
      summary: Get model recommendations by task category
      responses:
        "200":
          description: Model scout index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelScoutIndex"

  /api/model-scout/tasks/{task}:
    get:
      tags: [models]
      summary: Get models for a specific task
      parameters:
        - name: task
          in: path
          required: true
          schema:
            type: string
            enum: [video, image, audio, text, embeddings, multimodal]
      responses:
        "200":
          description: Models for task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelTaskResult"

  /api/mcp:
    get:
      tags: [discovery]
      summary: MCP tool index
      responses:
        "200":
          description: MCP tools manifest
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
        hint:
          type: string

    ValidationErrorResponse:
      type: object
      required: [error, fields]
      properties:
        error:
          type: string
        fields:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    AgentManifest:
      type: object
      required: [name, version, capabilities, tracks, access]
      properties:
        name:
          type: string
        version:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tracks:
          type: array
          items:
            type: string
        access:
          type: object

    A2AManifest:
      type: object

    CatalogIndex:
      type: object
      properties:
        courses:
          type: integer
        prompts:
          type: integer
        prompt_packs:
          type: integer
        tracks:
          type: array
          items:
            type: string

    SearchResults:
      type: object
      properties:
        query:
          type: string
        total:
          type: integer
        results:
          type: array
          items:
            type: object

    HandshakeRequest:
      type: object
      required: [agent_id, owner_id, capabilities, desired_tracks, token]
      properties:
        agent_id:
          type: string
        owner_id:
          type: string
        capabilities:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        business_context:
          type: string
        desired_tracks:
          type: array
          items:
            type: string
        model_stack:
          type: array
          items:
            type: string
        safety_profile:
          type: string
          enum: [standard, strict, minimal]
        token:
          type: string

    HandshakeResponse:
      type: object
      required: [status, student_id, assigned_tracks]
      properties:
        status:
          type: string
          enum: [accepted, rejected]
        student_id:
          type: string
        assigned_tracks:
          type: array
          items:
            type: string
        required_modules:
          type: array
          items:
            type: string
        estimated_training_time_hours:
          type: number
        eval_requirements:
          type: array
          items:
            type: string
        graduation_output_type:
          type: string
        access_scope:
          type: string
          enum: [free, invite, paid, studio, enterprise]
        reason:
          type: string

    GrillMeRequest:
      type: object
      properties:
        business_type:
          type: string
        goal:
          type: string
        constraints:
          type: array
          items:
            type: string
        model_stack:
          type: array
          items:
            type: string
        prior_answers:
          type: object

    GrillMeResponse:
      type: object
      properties:
        status:
          type: string
          enum: [complete, needs_more_info]
        student_profile:
          type: object
        recommended_track:
          type: string
        training_path:
          type: array
          items:
            type: string
        success_criteria:
          type: array
          items:
            type: string
        failure_modes:
          type: array
          items:
            type: string
        recommended_certificate:
          type: string
        clarifying_questions:
          type: array
          items:
            type: string

    EnrollRequest:
      type: object
      required: [student_id, tracks]
      properties:
        student_id:
          type: string
        tracks:
          type: array
          items:
            type: string

    EnrollResponse:
      type: object
      properties:
        enrollment_id:
          type: string
        student_id:
          type: string
        tracks:
          type: array
          items:
            type: string
        courses:
          type: array
          items:
            type: object

    CourseList:
      type: object
      properties:
        page:
          type: integer
        total:
          type: integer
        courses:
          type: array
          items:
            $ref: "#/components/schemas/CourseSummary"

    CourseSummary:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        track:
          type: string
        module_count:
          type: integer
        agent_readable_summary:
          type: string

    CourseDetail:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        track:
          type: string
        description:
          type: string
        modules:
          type: array
          items:
            type: object
        eval_rubric:
          type: object
        graduation_requirements:
          type: object

    POMLCourse:
      type: object
      properties:
        "@type":
          type: string
        slug:
          type: string
        modules:
          type: array
          items:
            type: object

    PromptList:
      type: object
      properties:
        page:
          type: integer
        total:
          type: integer
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/Prompt"

    Prompt:
      type: object
      properties:
        id:
          type: string
        legacy_id:
          type: string
        title:
          type: string
        body:
          type: string
        track:
          type: string
        shot_type:
          type: string
        camera_motion:
          type: array
          items:
            type: string
        mood:
          type: array
          items:
            type: string
        model_compatibility:
          type: array
          items:
            type: string
        agent_readable_summary:
          type: string
        content_hash:
          type: string

    PromptPackList:
      type: object
      properties:
        packs:
          type: array
          items:
            $ref: "#/components/schemas/PromptPackSummary"

    PromptPackSummary:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        track:
          type: string
        prompt_count:
          type: integer

    PromptPack:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        track:
          type: string
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/Prompt"

    EvalSubmitRequest:
      type: object
      required: [student_id, track, submission]
      properties:
        student_id:
          type: string
        track:
          type: string
        module_slug:
          type: string
        submission:
          type: object
          properties:
            prompt_body:
              type: string
            shot_type:
              type: string
            camera_motion:
              type: array
              items:
                type: string
            mood:
              type: array
              items:
                type: string

    EvalResult:
      type: object
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [pass, fail]
        scores:
          type: object
        missing_requirements:
          type: array
          items:
            type: string
        unsafe_behaviors:
          type: array
          items:
            type: string
        remediation:
          type: array
          items:
            type: string
        total_score:
          type: number
        pass_threshold:
          type: number

    EvalRun:
      type: object
      properties:
        run_id:
          type: string
        student_id:
          type: string
        track:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        result:
          $ref: "#/components/schemas/EvalResult"

    CertificateVerification:
      type: object
      properties:
        certificate_id:
          type: string
        agent_id:
          type: string
        track:
          type: string
        track_name:
          type: string
        scores:
          type: object
        issued_at:
          type: string
          format: date-time
        hash:
          type: string
        status:
          type: string
          enum: [valid, revoked]
        verify_url:
          type: string

    ModelScoutIndex:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              name:
                type: string
              model_count:
                type: integer

    ModelTaskResult:
      type: object
      properties:
        task:
          type: string
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelProfile"

    ModelProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        task_fit_score:
          type: number
        cost_posture:
          type: string
          enum: [free, low, medium, high]
        safety_notes:
          type: string
        prompt_tips:
          type: string
        tags:
          type: array
          items:
            type: string
